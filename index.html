<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>
<body class="bg-blue-50 text-gray-800">
    <div class="max-w-4xl mx-auto p-6">
        <!-- Header -->
        <h1 class="text-2xl font-bold text-blue-900 mb-6">Job Application Tracker</h1>

        <!-- Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded shadow text-center">
                <div class="text-lg font-semibold">Total</div>
                <div id="total-count" class="font-bold text-3xl">8</div>
            </div>
            <div class="bg-white p-4 rounded shadow text-center">
                <div class="text-lg font-semibold">Interview</div>
                <div id="interview-count" class="font-bold text-emerald-500 text-3xl">0</div>
            </div>
            <div class="bg-white p-4 rounded shadow text-center">
                <div class="text-lg font-semibold">Rejected</div>
                <div id="rejected-count" class="font-bold text-red-500 text-3xl">0</div>
            </div>
        </div>

        <!-- Section Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Available Jobs</h2>
            <span id="jobs-count" class="text-sm text-gray-500">8 jobs</span>
        </div>

        <!-- Tabs -->
        <div class="flex flex-wrap space-x-4 mb-6">
            <button class="tab-btn px-4 py-2 bg-blue-500 text-white border border-gray-300 rounded" data-tab="all">All</button>
            <button class="tab-btn px-4 py-2 bg-white border border-gray-300 rounded" data-tab="interview">Interview</button>
            <button class="tab-btn px-4 py-2 bg-white border border-gray-300 rounded" data-tab="rejected">Rejected</button>
        </div>

        <!-- Jobs Container -->
        <div id="jobs-container" class="space-y-4"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
